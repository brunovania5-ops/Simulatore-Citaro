<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>FORDEC Challenge Suite PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <!-- Setup View -->
        <div id="setup-view" class="bg-slate-900 p-8 rounded-2xl border border-slate-700">
            <h1 class="text-2xl font-bold text-emerald-400 mb-6">FORDEC Challenge Suite</h1>
            <input type="text" id="player-names" placeholder="Nomi (es: Mario, Luca, Anna)" class="w-full p-3 bg-slate-800 border border-slate-600 rounded mb-4">
            <button onclick="startChallenge()" class="w-full bg-emerald-600 py-3 rounded font-bold hover:bg-emerald-500">Avvia Sfida Multiplayer</button>
        </div>

        <!-- Game View -->
        <div id="game-view" class="hidden bg-slate-900 p-8 rounded-2xl border border-slate-700">
            <div id="turn-display" class="text-emerald-400 font-bold mb-4"></div>
            <h2 id="scenario-title" class="text-xl font-bold mb-2"></h2>
            <p id="scenario-facts" class="text-slate-300 mb-6"></p>
            <div id="audio-box" class="mb-6"></div>
            <div id="actions" class="grid grid-cols-1 md:grid-cols-3 gap-3"></div>
            <div id="fordec-box" class="hidden mt-6 p-4 bg-slate-800 border-l-4 border-emerald-500 rounded">
                <h3 class="font-bold mb-2">Analisi FORDEC</h3>
                <p id="fordec-text" class="text-slate-300"></p>
                <button onclick="nextTurn()" class="mt-4 w-full bg-emerald-700 py-2 rounded hover:bg-emerald-600">Prossimo</button>
            </div>
        </div>

        <!-- Results View -->
        <div id="results-view" class="hidden bg-slate-900 p-8 rounded-2xl border border-slate-700">
            <h2 class="text-2xl font-bold mb-6 text-emerald-400">Riepilogo Finale</h2>
            <div id="final-report"></div>
        </div>
    </div>

    <script>
        const scenarios = [
            { n: "Pressione Olio", f: "Spia rossa, rumore metallico.", c: "Fermo", a: "F: Pressione 0. O: Fermo. R: Grippaggio. D: Fermo immediato.", s: "motore_rotto.mp3" },
            { n: "Cinghia Servizi", f: "Spia batteria, fischio.", c: "Fermo", a: "F: Perdita servizi. O: Fermo. D: Fermo obbligatorio.", s: "cinghia_slitta.mp3" }
        ];

        let players = [], curP = 0, curS = 0;
        const audio = new Audio();

        function startChallenge() {
            const names = document.getElementById('player-names').value.split(',').map(n => n.trim()).filter(n => n);
            if(names.length < 1) return;
            players = names.map(n => ({ name: n, log: [] }));
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            render();
        }

        function render() {
            const s = scenarios[curS];
            document.getElementById('turn-display').innerText = `Tocca a: ${players[curP].name} | Scenario ${curS + 1}/${scenarios.length}`;
            document.getElementById('scenario-title').innerText = s.n;
            document.getElementById('scenario-facts').innerText = s.f;
            document.getElementById('fordec-box').classList.add('hidden');
            document.getElementById('audio-box').innerHTML = s.s ? `<button onclick="audio.src='${s.s}'; audio.play();" class="bg-blue-900 px-4 py-2 rounded text-blue-200">🔊 Riproduci Traccia</button>` : "";
            document.getElementById('actions').innerHTML = ["Fermo", "Assistenza", "Segnala"].map(o => `<button onclick="check('${o}')" class="p-4 bg-slate-800 border border-slate-600 rounded hover:bg-emerald-900">${o}</button>`).join('');
        }

        function check(choice) {
            const s = scenarios[curS];
            players[curP].log.push({ sc: s.n, ch: choice, cor: s.c, ok: choice === s.c });
            document.getElementById('fordec-text').innerText = s.a;
            document.getElementById('fordec-box').classList.remove('hidden');
            document.getElementById('actions').innerHTML = "";
        }

        function nextTurn() {
            curP++;
            if(curP >= players.length) { curP = 0; curS++; }
            if(curS >= scenarios.length) showResults(); else render();
        }

        function showResults() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('results-view').classList.remove('hidden');
            document.getElementById('final-report').innerHTML = players.map(p => `
                <div class="mb-6 bg-slate-800 p-4 rounded">
                    <h3 class="font-bold text-emerald-400 mb-2">${p.name}</h3>
                    ${p.log.map(l => `<p class="${l.ok ? 'text-emerald-300' : 'text-red-300'}">${l.sc}: Scelto "${l.ch}" (${l.ok ? 'Corretto' : 'Errato, atteso: ' + l.cor})</p>`).join('')}
                </div>`).join('');
        }
    </script>
</body>
</html>
