<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORDEC Master Controller - Definitivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6 font-sans">

    <div class="max-w-2xl mx-auto" id="app">
        <!-- Pannello Generazione QR (Sempre attivo) -->
        <div id="view-setup" class="bg-slate-900 p-8 rounded-2xl border border-slate-700 shadow-2xl">
            <h1 class="text-3xl font-bold text-emerald-400 mb-6">Genera Arena FORDEC</h1>
            
            <div class="space-y-4 mb-8">
                <button onclick="generaSess()" class="w-full bg-emerald-600 py-4 rounded-xl font-bold text-lg hover:bg-emerald-500 transition">Genera QR Code Sessione</button>
                <div id="qr-box" class="hidden flex flex-col items-center bg-white p-4 rounded-xl mt-4">
                    <div id="qrcode"></div>
                    <p class="text-slate-900 mt-2 font-bold text-sm">Scannerizza per partecipare!</p>
                </div>
            </div>

            <div class="mt-8 border-t border-slate-700 pt-6">
                <h3 class="text-slate-400 text-sm mb-4">Pannello Admin</h3>
                <button onclick="visualizzaRisultati()" class="w-full bg-slate-800 py-3 rounded-lg text-sm hover:bg-slate-700 transition border border-slate-600">Visualizza Risultati in Tempo Reale</button>
            </div>
        </div>
    </div>

    <script>
        // Funzione per generare il QR Code
        function generaSess() {
            const container = document.getElementById("qrcode");
            const box = document.getElementById("qr-box");
            container.innerHTML = ""; // Pulisce precedente
            
            // Genera QR basato sull'URL corrente
            new QRCode(container, window.location.href);
            box.classList.remove('hidden');
        }

        // Simula la visualizzazione dei risultati
        function visualizzaRisultati() {
            alert("In questa versione offline, i risultati vengono salvati nel localStorage del tuo browser. Apri la console (F12) e digita 'localStorage.getItem(\"fordec_data\")' per estrarre i dati!");
        }

        // Se l'utente è un conducente che apre il link, mostriamo l'interfaccia di voto
        if(window.location.search.includes('participant')) {
            document.body.innerHTML = `
                <div class="p-8 text-center">
                    <h2 class="text-2xl font-bold text-emerald-400 mb-4">FORDEC Simulator</h2>
                    <p class="mb-6">Scenario: Scoppio Pneumatico. Cosa fai?</p>
                    <button onclick="vota('Inchiodare')" class="w-full p-4 bg-red-900 rounded-lg mb-2">Inchiodare</button>
                    <button onclick="vota('Graduale')" class="w-full p-4 bg-emerald-900 rounded-lg">Frenata Graduale</button>
                </div>
            `;
        }

        function vota(scelta) {
            let data = JSON.parse(localStorage.getItem('fordec_data') || '[]');
            data.push({ scelta: scelta, timestamp: new Date().getTime() });
            localStorage.setItem('fordec_data', JSON.stringify(data));
            alert("Voto registrato!");
        }
    </script>
</body>
</html>
