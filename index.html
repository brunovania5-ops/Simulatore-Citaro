<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>FORDEC Docente - 10 Scenari</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <div id="app" class="max-w-2xl mx-auto bg-slate-900 p-8 rounded-2xl border border-slate-700">
        <!-- Contenuto dinamico -->
    </div>

    <script>
        const scenarios = [
            {n: "Pressione Olio", f: "Spia rossa, rumore metallico.", c: "Fermo"},
            {n: "Pedana Disabili", f: "Pedana bloccata.", c: "Assistenza"},
            {n: "Filtro Abitacolo", f: "Odore muffa.", c: "Proseguire"},
            {n: "Anomalia ECAS", f: "Bus inclinato.", c: "Reset"},
            {n: "AdBlue", f: "Spia gialla emissioni.", c: "Proseguire"},
            {n: "Scatola Sterzo", f: "Gioco volante.", c: "Fermo"},
            {n: "Refrigerante", f: "Livello minimo acqua.", c: "Fermo"},
            {n: "Porte", f: "Porta rimbalza.", c: "Proseguire"},
            {n: "Freni", f: "Fischio in frenata.", c: "Proseguire"},
            {n: "Spazzole tergi rumorose", f: "Spazzole tergi indurite.", c: "Proseguire"}.
            {n: "Anomalia Climatizzatore", f: "Il climatizzatore non raffresca.", c: "Assistenza"}, 
            {n: "Veicolo in derate", f: "Spia rossa AdBlue.", c: "Fermo"},
            {n: "Anomalia pressione pneumatici", f: "Spia pressione pneumatici.", c: "Fermo"},
            {n: "Filtro gasolio intasato", f: "Il motore perde potenza in accelerazione, minimo instabile, spegnimenti improvvisi, problemi di avviamento .", c: "Fermo"}    
{n: "       {n: "Liquido tergicristalli", f: "Livello minimo del liquido tergicristalli.", c: "Proseguire"},
            {n: "Problema al motore", f: "Spia batteria rossa.", c: "Fermo"}
        ];

        let curS = 0;
        let results = [];

        function render() {
            if(curS >= scenarios.length) {
                document.getElementById('app').innerHTML = `
                    <h2 class="text-2xl font-bold text-emerald-400 mb-6">Riepilogo Finale</h2>
                    ${results.map(r => `<p class="mb-2 ${r.ok ? 'text-green-400' : 'text-red-400'}">${r.n}: ${r.scelta} (${r.ok ? 'Corretto' : 'Errato, atteso: ' + r.c})</p>`).join('')}
                    <button onclick="location.reload()" class="mt-6 w-full bg-slate-700 py-3 rounded">Nuova Sessione</button>
                `;
                return;
            }
            const s = scenarios[curS];
            document.getElementById('app').innerHTML = `
                <div class="text-emerald-400 font-bold mb-2">Scenario ${curS + 1}/10</div>
                <h1 class="text-3xl font-bold mb-4">${s.n}</h1>
                <p class="text-lg text-slate-300 mb-8">${s.f}</p>
                <div class="grid gap-4">
                    ${["Fermo", "Assistenza", "Reset", "Proseguire", "Evacuare"].map(o => 
                        `<button onclick="submit('${o}')" class="p-4 bg-slate-800 hover:bg-emerald-800 border border-slate-600 rounded text-left font-bold transition">${o}</button>`
                    ).join('')}
                </div>
            `;
        }

        function submit(scelta) {
            const s = scenarios[curS];
            results.push({n: s.n, scelta: scelta, c: s.c, ok: scelta === s.c});
            curS++;
            render();
        }

        render();
    </script>
</body>
</html>
