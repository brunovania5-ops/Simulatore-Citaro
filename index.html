<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>FORDEC Challenge - Sessione Individuale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-md w-full" id="app">
        <!-- Setup -->
        <div id="view-setup" class="bg-slate-900 p-8 rounded-2xl border border-slate-700">
            <h1 class="text-2xl font-bold text-emerald-400 mb-6">FORDEC Challenge</h1>
            <input type="text" id="player-name" placeholder="Inserisci il tuo nome" class="w-full p-3 bg-slate-800 border border-slate-600 rounded mb-4">
            <button onclick="joinGame()" class="w-full bg-emerald-600 py-3 rounded font-bold hover:bg-emerald-500">Entra in Partita</button>
            <div id="qr-container" class="mt-8 flex flex-col items-center hidden">
                <p class="text-sm text-slate-400 mb-2">QR Code per i colleghi:</p>
                <div id="qrcode" class="bg-white p-2 rounded"></div>
            </div>
        </div>

        <!-- Game -->
        <div id="view-game" class="hidden bg-slate-900 p-8 rounded-2xl border border-slate-700">
            <div class="text-emerald-400 text-xs font-bold mb-2" id="progress">Scenario 1/6</div>
            <h2 id="scenario-title" class="text-xl font-bold mb-4"></h2>
            <p id="scenario-facts" class="text-slate-300 mb-6"></p>
            <div id="options" class="grid gap-3"></div>
        </div>

        <!-- Results -->
        <div id="view-results" class="hidden bg-slate-900 p-8 rounded-2xl border border-slate-700">
            <h2 class="text-2xl font-bold text-emerald-400 mb-4">Fine Partita</h2>
            <div id="final-stats" class="text-lg mb-6"></div>
            <button onclick="location.reload()" class="w-full bg-slate-700 py-3 rounded hover:bg-slate-600">Nuova Partita</button>
        </div>
    </div>

    <script>
        const scenarios = [
            { n: "Scoppio Pneumatico", f: "A 70km/h botto post. destro.", c: "Graduale", opts: ["Inchiodare", "Graduale", "Proseguire a 50 km/h"] },
            { n: "Incendio Motore", f: "Fumo posteriore.", c: "Evacuare", opts: ["Aprire vano", "Evacuare", "Spegnere l'incendio"] },
            { n: "Anomalia ECAS", f: "Bus inclinato.", c: "Reset", opts: ["Fermare", "Reset", "Proseguire, senza tentare reset"] },
            { n: "Pressione Olio 0", f: "Spia rossa.", c: "Spegnere", opts: ["Proseguire", "Spegnere", "Rabboccare olio"] },
            { n: "Pedana Disabili", f: "Pedana bloccata.", c: "Assistenza", opts: ["Proseguire", "Assistenza", "Far scendere il disabile"] },
            { n: "Cinghia Servizi", f: "Spia batteria.", c: "Fermarsi", opts: ["Proseguire", "Fermarsi", "Non è un problema importante"] }
            { n: "Veicolo in derate", f: "Spia AdBle rossa.", c: "Fermarsi", opts: ["Proseguire", "Fermarsi", "Segnalare di fare bypass sistema SCR"] }
            { n: "Anomalia sistema TPMS", f: "Pressione Pneumatico lampeggiante all'avvio.", c: "Graduale", opts: ["Proseguire", "Inchiodare", "Graduale"] }
            { n: "Anomalia sospensioni pneumatiche", f: "Spia accesa.", c: "Fermarsi", opts: ["Proseguire", "Fermarsi", "Non segnalare in assistenza, la perdita è minima"] }
            { n: "Veicolo in derate", f: "Spia AdBle rossa.", c: "Fermarsi", opts: ["Proseguire", "Fermarsi", "Segnalare di fare bypass sistema SC"] }
            { n: "Rumore Spazzole tergicristallo", f: "Spazzole tergicristallo indurite.", c: "Proseguire", opts: ["Proseguire", "Fermarsi", "Non è necessario segnalare"] }
        ];

        let state = { name: "", curS: 0, score: 0 };

        function joinGame() {
            state.name = document.getElementById('player-name').value;
            if(!state.name) return alert("Inserisci un nome!");
            document.getElementById('view-setup').classList.add('hidden');
            document.getElementById('view-game').classList.remove('hidden');
            renderGame();
        }

        function renderGame() {
            const s = scenarios[state.curS];
            document.getElementById('progress').innerText = `Scenario ${state.curS + 1}/${scenarios.length}`;
            document.getElementById('scenario-title').innerText = s.n;
            document.getElementById('scenario-facts').innerText = s.f;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = s.opts.map(o => `<button onclick="handleAnswer('${o}')" class="p-4 bg-slate-800 border border-slate-600 rounded hover:bg-emerald-900">${o}</button>`).join('');
        }

        function handleAnswer(ans) {
            if(ans === scenarios[state.curS].c) state.score++;
            state.curS++;
            if(state.curS >= scenarios.length) showResults(); else renderGame();
        }

        function showResults() {
            document.getElementById('view-game').classList.add('hidden');
            document.getElementById('view-results').classList.remove('hidden');
            document.getElementById('final-stats').innerText = `${state.name}, il tuo punteggio finale è: ${state.score}/${scenarios.length}`;
        }

        new QRCode(document.getElementById("qrcode"), window.location.href);
        if(window.location.href.includes('?')) document.getElementById('qr-container').classList.add('hidden');
    </script>
</body>
</html>
