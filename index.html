<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>FORDEC Arena PRO - Multi-Device</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6">
    <div id="app" class="max-w-4xl mx-auto">
        <!-- Dashboard Docente -->
        <div id="admin-panel" class="hidden">
            <h1 class="text-3xl font-bold text-emerald-400 mb-6">Pannello Docente</h1>
            <div id="qrcode" class="bg-white p-4 inline-block rounded-lg"></div>
            <div id="live-results" class="mt-8 grid grid-cols-1 gap-4"></div>
        </div>

        <!-- Interfaccia Conducente -->
        <div id="player-panel" class="hidden">
            <h1 class="text-2xl font-bold mb-4">FORDEC Simulator</h1>
            <input type="text" id="p-name" placeholder="Inserisci il tuo Nome" class="w-full p-3 bg-slate-800 rounded mb-4">
            <div id="scenario-vote"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzlxRSfNa2LFbliJhgrX64syj_XOABcPE4bMTshRBSLhMJ6s7wWK-zjEsyTp0ckMR1UcA/exec";
        const scenarios = [
            {n: "Pressione Olio", c: "Fermo"}, {n: "Pedana Disabili", c: "Assistenza"},
            {n: "Filtro Abitacolo", c: "Proseguire"}, {n: "Anomalia ECAS", c: "Reset"},
            {n: "AdBlue", c: "Proseguire"}, {n: "Scatola Sterzo", c: "Fermo"},
            {n: "Refrigerante", c: "Fermo"}, {n: "Porte", c: "Proseguire"},
            {n: "Freni", c: "Proseguire"}, {n: "Alternatore", c: "Fermo"}
        ];

        // Riconoscimento ruolo
        if(window.location.hash === '#admin') {
            document.getElementById('admin-panel').classList.remove('hidden');
            new QRCode(document.getElementById("qrcode"), window.location.href.split('#')[0]);
        } else {
            document.getElementById('player-panel').classList.remove('hidden');
        }

        function submitVote(scenario, vote) {
            const name = document.getElementById('p-name').value;
            fetch(API_URL, { method: 'POST', body: JSON.stringify({ player: name, scenario: scenario, vote: vote }) });
            alert("Voto inviato!");
        }
    </script>
</body>
</html>
